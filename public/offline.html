<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | fella7com</title>
  <style>
    :root {
      --color-primary: #2d6a4f;
      --color-primary-dark: #1b4332;
      --color-bg: #fdfdfb;
      --color-text: #1a1a1a;
      --color-text-secondary: #5c5c5c;
      --color-border: #e8e5de;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      background-image: 
        radial-gradient(var(--color-border) 0.5px, transparent 0.5px),
        radial-gradient(var(--color-border) 0.5px, var(--color-bg) 0.5px);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }

    .container {
      max-width: 450px;
      background: #ffffff;
      border: 1px solid var(--color-border);
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-container {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: #d8f3dc;
      color: var(--color-primary);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--color-primary-dark);
    }

    p {
      font-size: 15px;
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2);
    }

    .btn-retry:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(45, 106, 79, 0.3);
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--color-primary);
      background-color: #d8f3dc;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-container">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5a12.5 12.5 0 0 1-1.7 8.3L15 18a9 9 0 0 0 1-3.5c0-.62-.06-1.22-.18-1.8M5 5a9 9 0 0 0-1 3.5c0 1.6.43 3.1 1.2 4.4L3 15a12.5 12.5 0 0 1-1.7-8.3A10.94 10.94 0 0 1 5 5z"/>
        <path d="M12 12.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7zM8.5 8.5a6.5 6.5 0 0 1 7.1 0"/>
      </svg>
    </div>
    <div class="badge">Offline Mode</div>
    <h1>Connection Lost</h1>
    <p>Please check your internet connection. fella7com will automatically reload once you are back online, or you can try manually reconnecting below.</p>
    <button class="btn-retry" onclick="window.location.reload()">Retry Connection</button>
  </div>

  <script>
    // Listen for online event and reload automatically
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Check periodically if online
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
